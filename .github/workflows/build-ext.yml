name: Build Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cmake_arch: Win32
            discord_static_dir: win32-static
            fre_lib_relative: lib\win\FlashRuntimeExtensions.lib
            ane_platform: Windows-x86
          - cmake_arch: x64
            discord_static_dir: win64-static
            fre_lib_relative: lib\win64\FlashRuntimeExtensions.lib
            ane_platform: Windows-x86-64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Download discord-rpc
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest `
            -Uri "https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-win.zip" `
            -OutFile discord-rpc-win.zip
          Expand-Archive discord-rpc-win.zip -DestinationPath .

      - name: Build native library
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $freLibraryPath = Join-Path $env:AIR_HOME "${{ matrix.fre_lib_relative }}"
          $freLibrary = if (Test-Path $freLibraryPath) { Get-Item $freLibraryPath } else { $null }

          if ($null -eq $freLibrary -and "${{ matrix.cmake_arch }}" -eq "Win32") {
            $freLibrary = Get-Item C\AdobeAIR-DiscordRPC\FlashRuntimeExtensions.lib
          }

          if ($null -eq $freLibrary) {
            Write-Host "Expected FRE import library: $freLibraryPath"
            Write-Host "Available FlashRuntimeExtensions.lib files under AIR_HOME:"
            Get-ChildItem -Path $env:AIR_HOME -Recurse -Filter FlashRuntimeExtensions.lib |
              ForEach-Object { Write-Host $_.FullName }
            throw "Could not find a ${{ matrix.cmake_arch }} FlashRuntimeExtensions.lib in AIR_HOME."
          }

          Write-Host "Using FRE import library: $($freLibrary.FullName)"
          cmake -S C\AdobeAIR-DiscordRPC -B build\native `
            -A ${{ matrix.cmake_arch }} `
            -DDISCORD_RPC_LIBRARY=${{ github.workspace }}\discord-rpc\${{ matrix.discord_static_dir }}\lib\discord-rpc.lib `
            -DFRE_LIBRARY="$($freLibrary.FullName)"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build build\native --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Stage ANE platform files
        shell: powershell
        run: |
          $platformDir = "build\${{ matrix.ane_platform }}"
          New-Item -ItemType Directory -Force -Path $platformDir | Out-Null
          Copy-Item build\native\Release\AdobeAIR-DiscordRPC.dll $platformDir

      - name: Upload platform files
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.ane_platform }}
          path: build/${{ matrix.ane_platform }}/AdobeAIR-DiscordRPC.dll

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Download discord-rpc
        shell: bash
        run: |
          set -euo pipefail
          curl -L \
            -o discord-rpc-osx.zip \
            https://github.com/discord/discord-rpc/releases/download/v3.4.0/discord-rpc-osx.zip
          unzip -q discord-rpc-osx.zip

      - name: Build native library
        shell: bash
        run: |
          set -euo pipefail
          cmake -S C/AdobeAIR-DiscordRPC -B build/native \
            -G Xcode \
            -DDISCORD_RPC_LIBRARY="$PWD/discord-rpc/osx-static/lib/libdiscord-rpc.a" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64"
          cmake --build build/native --config Release

      - name: Stage ANE platform files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/MacOS-x86-64
          cp -R build/native/Release/AdobeAIR-DiscordRPC.framework build/MacOS-x86-64/
          framework="build/MacOS-x86-64/AdobeAIR-DiscordRPC.framework"

          if [ -L "$framework/AdobeAIR-DiscordRPC" ]; then
            target="$(readlink "$framework/AdobeAIR-DiscordRPC")"
            rm "$framework/AdobeAIR-DiscordRPC"
            cp "$framework/$target" "$framework/AdobeAIR-DiscordRPC"
          fi

          if [ -L "$framework/Resources" ]; then
            target="$(readlink "$framework/Resources")"
            rm "$framework/Resources"
            cp -R "$framework/$target" "$framework/Resources"
          fi

          test -f "$framework/AdobeAIR-DiscordRPC"

      - name: Upload platform files
        uses: actions/upload-artifact@v4
        with:
          name: platform-MacOS-x86-64
          path: build/MacOS-x86-64/AdobeAIR-DiscordRPC.framework/

  package-extension:
    needs:
      - build-windows
      - build-macos
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Download platform files
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: Platform
          merge-multiple: false

      - name: Build SWC
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          acompc `
            -source-path AS3\Windows-x86\src `
            -include-sources AS3\Windows-x86\src `
            -swf-version=13 `
            -output build\DiscordRPC.swc

      - name: Stage library SWF
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $swcExtractDir = "build\swc"
          New-Item -ItemType Directory -Force -Path $swcExtractDir | Out-Null
          Copy-Item build\DiscordRPC.swc build\DiscordRPC.zip -Force
          Expand-Archive build\DiscordRPC.zip -DestinationPath $swcExtractDir -Force

          @(
            "Platform\platform-Windows-x86",
            "Platform\platform-Windows-x86-64",
            "Platform\platform-MacOS-x86-64"
          ) | ForEach-Object {
            Copy-Item "$swcExtractDir\library.swf" $_
          }

      - name: Normalize macOS framework payload
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $platformDir = "Platform\platform-MacOS-x86-64"
          $frameworkDir = "$platformDir\AdobeAIR-DiscordRPC.framework"
          $looseBinary = "$platformDir\AdobeAIR-DiscordRPC"

          if (-not (Test-Path $frameworkDir) -and (Test-Path $looseBinary)) {
            New-Item -ItemType Directory -Force -Path $frameworkDir | Out-Null
            Get-ChildItem $platformDir |
              Where-Object { $_.Name -ne "AdobeAIR-DiscordRPC.framework" -and $_.Name -ne "library.swf" } |
              ForEach-Object { Move-Item $_.FullName $frameworkDir }
          }

      - name: Validate platform payloads
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $expectedFiles = @(
            "Platform\platform-Windows-x86\AdobeAIR-DiscordRPC.dll",
            "Platform\platform-Windows-x86-64\AdobeAIR-DiscordRPC.dll",
            "Platform\platform-MacOS-x86-64\AdobeAIR-DiscordRPC.framework\AdobeAIR-DiscordRPC",
            "Platform\platform-Windows-x86\library.swf",
            "Platform\platform-Windows-x86-64\library.swf",
            "Platform\platform-MacOS-x86-64\library.swf"
          )

          foreach ($file in $expectedFiles) {
            if (-not (Test-Path $file)) {
              Write-Host "Platform directory contents:"
              Get-ChildItem Platform -Recurse | ForEach-Object { Write-Host $_.FullName }
              throw "Missing expected ANE payload file: $file"
            }
          }

      - name: Package ANE
        shell: powershell
        run: |
          adt -package -target ane DiscordRPC.ane AS3\extension.xml `
            -swc build\DiscordRPC.swc `
            -platform Windows-x86 `
            -C Platform\platform-Windows-x86 . `
            -platform Windows-x86-64 `
            -C Platform\platform-Windows-x86-64 . `
            -platform MacOS-x86-64 `
            -C Platform\platform-MacOS-x86-64 .

      - name: Upload ANE
        uses: actions/upload-artifact@v4
        with:
          name: DiscordRPC-ane
          path: DiscordRPC.ane
