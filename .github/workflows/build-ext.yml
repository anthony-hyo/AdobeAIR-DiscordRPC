name: Build Extension

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cmake_arch: Win32
            ane_platform: Windows-x86
          - cmake_arch: x64
            ane_platform: Windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Checkout discord-rpc
        uses: actions/checkout@v4
        with:
          repository: discord/discord-rpc
          path: discord-rpc

      - name: Build discord-rpc
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S discord-rpc -B discord-rpc\build `
            -A ${{ matrix.cmake_arch }} `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_SHARED_LIBS=OFF `
            -DCLANG_FORMAT_CMD=CLANG_FORMAT_CMD-NOTFOUND `
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build discord-rpc\build --config Release --target discord-rpc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build native library
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S C\AdobeAIR-DiscordRPC -B build\native `
            -A ${{ matrix.cmake_arch }} `
            -DDISCORD_RPC_LIBRARY=${{ github.workspace }}\discord-rpc\build\src\Release\discord-rpc.lib
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cmake --build build\native --config Release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build SWC
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          acompc `
            -source-path AS3\Windows-x86\src `
            -include-sources AS3\Windows-x86\src `
            -output build\DiscordRPC-${{ matrix.ane_platform }}.swc

      - name: Stage ANE platform files
        shell: powershell
        run: |
          $platformDir = "build\${{ matrix.ane_platform }}"
          New-Item -ItemType Directory -Force -Path $platformDir | Out-Null
          Copy-Item build\native\Release\AdobeAIR-DiscordRPC.dll $platformDir

      - name: Upload SWC
        uses: actions/upload-artifact@v4
        with:
          name: swc-${{ matrix.ane_platform }}
          path: build/DiscordRPC-${{ matrix.ane_platform }}.swc

      - name: Upload platform files
        uses: actions/upload-artifact@v4
        with:
          name: platform-${{ matrix.ane_platform }}
          path: build/${{ matrix.ane_platform }}/AdobeAIR-DiscordRPC.dll

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Checkout discord-rpc
        uses: actions/checkout@v4
        with:
          repository: discord/discord-rpc
          path: discord-rpc

      - name: Build discord-rpc
        shell: bash
        run: |
          set -euo pipefail
          cmake -S discord-rpc -B discord-rpc/build \
            -G Xcode \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DCLANG_FORMAT_CMD=CLANG_FORMAT_CMD-NOTFOUND \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_POLICY_VERSION_MINIMUM="3.5"
          cmake --build discord-rpc/build --config Release --target discord-rpc

      - name: Build native library
        shell: bash
        run: |
          set -euo pipefail
          DISCORD_RPC_LIB="$(find "$PWD/discord-rpc/build" \( -name 'libdiscord-rpc.a' -o -name 'discord-rpc.a' \) | head -n 1)"
          test -n "$DISCORD_RPC_LIB"
          cmake -S C/AdobeAIR-DiscordRPC -B build/native \
            -G Xcode \
            -DDISCORD_RPC_LIBRARY="$DISCORD_RPC_LIB" \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build build/native --config Release

      - name: Build SWC
        shell: bash
        run: |
          mkdir -p build
          acompc \
            -source-path AS3/Windows-x86/src \
            -include-sources AS3/Windows-x86/src \
            -output build/DiscordRPC-MacOS-x86-64.swc

      - name: Stage ANE platform files
        shell: bash
        run: |
          mkdir -p build/MacOS-x86-64
          cp build/native/Release/AdobeAIR-DiscordRPC.dylib build/MacOS-x86-64/

      - name: Upload SWC
        uses: actions/upload-artifact@v4
        with:
          name: swc-MacOS-x86-64
          path: build/DiscordRPC-MacOS-x86-64.swc

      - name: Upload platform files
        uses: actions/upload-artifact@v4
        with:
          name: platform-MacOS-x86-64
          path: build/MacOS-x86-64/AdobeAIR-DiscordRPC.dylib

  package-extension:
    needs:
      - build-windows
      - build-macos
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AIR SDK
        uses: joshtynjala/setup-adobe-air-action@v2
        with:
          air-version: "51.3"
          accept-license: true

      - name: Download SWCs
        uses: actions/download-artifact@v4
        with:
          pattern: swc-*
          path: build
          merge-multiple: true

      - name: Download platform files
        uses: actions/download-artifact@v4
        with:
          pattern: platform-*
          path: Platform
          merge-multiple: false

      - name: Package ANE
        shell: powershell
        run: |
          adt -package -target ane DiscordRPC.ane AS3\extension.xml `
            -swc build\DiscordRPC-Windows-x86.swc `
            -platform Windows-x86 `
            -C Platform\platform-Windows-x86 . `
            -swc build\DiscordRPC-Windows-x64.swc `
            -platform Windows-x64 `
            -C Platform\platform-Windows-x64 . `
            -swc build\DiscordRPC-MacOS-x86-64.swc `
            -platform MacOS-x86-64 `
            -C Platform\platform-MacOS-x86-64 .

      - name: Upload ANE
        uses: actions/upload-artifact@v4
        with:
          name: DiscordRPC-ane
          path: DiscordRPC.ane
